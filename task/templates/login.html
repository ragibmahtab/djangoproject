{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="w-[500px] mx-auto mt-20 bg-amber-400 text-black p-8 rounded-2xl shadow-amber-500/30 shadow-lg">

  <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

  {% if messages %}
    {% for message in messages %}
      <p class="text-{{ message.tags }}-700 font-bold text-center mb-4">{{ message }}</p>
    {% endfor %}
  {% endif %}

  {% if error %}
    <p class="text-red-700 font-bold text-center mb-4">{{ error }}</p>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="mb-4">
      <label class="block font-bold mb-1">Username</label>
      <input type="text" name="username" required placeholder="Enter your username"
        class="w-full h-10 px-4 rounded-xl bg-neutral-200 text-black outline-none border border-black">
    </div>

    <div class="mb-4">
      <label class="block font-bold mb-1">Password</label>
      <input type="password" name="password" required placeholder="Enter your Password"
        class="w-full h-10 px-4 rounded-xl bg-neutral-200 text-black outline-none border border-black">
    </div>

    <button type="submit"
      class="w-full h-10 rounded-xl bg-zinc-900 text-amber-400 hover:bg-neutral-700 font-bold mt-2">
      Login
    </button>

  </form>

  <p class="text-center mt-4">
    Don't have an account? 
    <a href="{% url 'signup' %}" class="font-bold underline">Signup here</a>
  </p>

</div>

{% endblock %}
