{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Event Management{% endblock %}</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>

<body class="bg-gray-950 text-amber-400">

<!-- Navbar -->
<div class="flex justify-between items-center p-6 max-w-[1400px] mx-auto my-4 bg-zinc-900 rounded-2xl shadow-amber-500/30 shadow-lg">

    <h1 class="text-2xl font-bold italic underline">ELLUMINATE</h1>

    <div class="flex gap-6 text-lg">
        <a href="{% url 'homepage' %}" class="hover:text-amber-200">Home</a>

        {% if user.is_authenticated %}
            <a href="{% url 'user_profile' %}" class="hover:text-amber-200">Profile</a>
            <a href="{% url 'logout' %}" class="hover:text-amber-200">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="hover:text-amber-200">Login</a>
            <a href="{% url 'signup' %}" class="hover:text-amber-200">Signup</a>
        {% endif %}
    </div>

</div>

{% block content %}
{% endblock %}

</body>
</html>
