{% extends 'base.html' %}
{% block title %}Event Form{% endblock %}

{% block content %}

<div class="w-[600px] mx-auto bg-zinc-900 p-8 rounded-2xl mt-10">

<h2 class="text-2xl font-bold mb-4 text-center">Event Form</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="bg-amber-400 text-black px-6 py-2 rounded-xl mt-4">
        Submit
    </button>
</form>

</div>

{% endblock %}
