{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}

<div class="w-[1400px] mx-auto grid grid-cols-3 gap-6 my-10">

<div class="bg-zinc-900 p-6 rounded-2xl text-center">
    <h2 class="text-xl font-bold">Total Events</h2>
    <p class="text-2xl">{{ events.count }}</p>
</div>

<div class="bg-zinc-900 p-6 rounded-2xl text-center">
    <h2 class="text-xl font-bold">Total Users</h2>
    <p class="text-2xl">{{ users.count }}</p>
</div>

<div class="bg-zinc-900 p-6 rounded-2xl text-center">
    <h2 class="text-xl font-bold">Total Categories</h2>
    <p class="text-2xl">{{ categories.count }}</p>
</div>

</div>

{% endblock %}
