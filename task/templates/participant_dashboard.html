{% extends 'base.html' %}
{% block title %}Participant Dashboard{% endblock %}

{% block content %}

<div class="w-[1400px] mx-auto my-10">

<h1 class="text-3xl font-bold text-center mb-6">
Your RSVP Events
</h1>

<div class="grid grid-cols-3 gap-6">

{% for event in events %}
<div class="bg-zinc-900 p-4 rounded-2xl">
    <h2 class="text-xl font-bold">{{ event.name }}</h2>
    <p>{{ event.date }}</p>
</div>
{% empty %}
<p>No RSVP yet.</p>
{% endfor %}

</div>

</div>

{% endblock %}
